server:
  port: 8888
  shutdown: graceful
---
spring:
  application:
    name: API-GATEWAY
  lifecycle:
    timeout-per-shutdown-phase: 30s
  cloud:
    gateway:
      routes:
        # =====================
        # AUTH-SERVICE  :8088
        # =====================
        - id: auth-service-auth
          uri: http://auth-service:8088
          predicates:
            - Path=/api/v1/auth/**
        - id: auth-service-roles
          uri: http://auth-service:8088
          predicates:
            - Path=/api/v1/roles/**
        - id: auth-service-users
          uri: http://auth-service:8088
          predicates:
            - Path=/api/v1/users/**
        # =====================
        # PRODUCT-SERVICE  :8086
        # =====================
        - id: product-service-categories
          uri: http://product-service:8086
          predicates:
            - Path=/api/categories/**
        - id: product-service-products
          uri: http://product-service:8086
          predicates:
            - Path=/api/products/**
        # =====================
        # ORDER-SERVICE  :8084
        # =====================
        - id: order-service-carts
          uri: http://order-service:8084
          predicates:
            - Path=/api/carts/**
        - id: order-service-orders
          uri: http://order-service:8084
          predicates:
            - Path=/api/orders/**
        # =====================
        # PAYMENT-SERVICE  :8085
        # =====================
        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/api/payments/**
        # =====================
        # INVENTORY-SERVICE  :8082
        # =====================
        - id: inventory-service
          uri: http://inventory-service:8082
          predicates:
            - Path=/api/inventory/**
        # =====================
        # SHIPPING-SERVICE  :8087
        # =====================
        - id: shipping-service
          uri: http://shipping-service:8087
          predicates:
            - Path=/api/shippings/**
        # =====================
        # FAVOURITE-SERVICE  :8081
        # =====================
        - id: favourite-service
          uri: http://favourite-service:8081
          predicates:
            - Path=/api/favourites/**
        # =====================
        # NOTIFICATION-SERVICE  :8090
        # =====================
        - id: notification-service-email
          uri: http://notification-service:8090
          predicates:
            - Path=/api/email/**
        - id: notification-service-notifications
          uri: http://notification-service:8090
          predicates:
            - Path=/api/notifications/**
        - id: notification-service-payment-notifications
          uri: http://notification-service:8090
          predicates:
            - Path=/api/payment-notifications/**
        # =====================
        # MEDIA-SERVICE  :8083
        # =====================
        - id: media-service
          uri: http://media-service:8083
          predicates:
            - Path=/medias/**
        # =====================
        # RATING-SERVICE  :8089
        # =====================
        - id: rating-service-storefront
          uri: http://rating-service:8089
          predicates:
            - Path=/storefront/ratings/**
        - id: rating-service-backoffice
          uri: http://rating-service:8089
          predicates:
            - Path=/backoffice/ratings/**
        # =====================
        # SEARCH-SERVICE  :8094
        # =====================
        - id: search-service
          uri: http://search-service:8094
          predicates:
            - Path=/storefront/catalog-search,/storefront/search_suggest
        # =====================
        # PROMOTION-SERVICE  :8093
        # =====================
        - id: promotion-service
          uri: http://promotion-service:8093
          predicates:
            - Path=/backoffice/promotions/**
        # =====================
        # TAX-SERVICE  :8091
        # =====================
        - id: tax-service-classes
          uri: http://tax-service:8091
          predicates:
            - Path=/backoffice/tax-classes/**
        - id: tax-service-rates
          uri: http://tax-service:8091
          predicates:
            - Path=/backoffice/tax-rates/**
        # =====================
        # SWAGGER / OpenAPI aggregation
        # =====================
        - id: openapi-auth
          uri: http://auth-service:8088
          predicates:
            - Path=/auth/v3/api-docs/**
        - id: openapi-product
          uri: http://product-service:8086
          predicates:
            - Path=/product/v3/api-docs/**
        - id: openapi-order
          uri: http://order-service:8084
          predicates:
            - Path=/order/v3/api-docs/**
        - id: openapi-payment
          uri: http://payment-service:8085
          predicates:
            - Path=/payment/v3/api-docs/**
        - id: openapi-inventory
          uri: http://inventory-service:8082
          predicates:
            - Path=/inventory/v3/api-docs/**
        - id: openapi-shipping
          uri: http://shipping-service:8087
          predicates:
            - Path=/shipping/v3/api-docs/**
        - id: openapi-favourite
          uri: http://favourite-service:8081
          predicates:
            - Path=/favourite/v3/api-docs/**
        - id: openapi-notification
          uri: http://notification-service:8090
          predicates:
            - Path=/notification/v3/api-docs/**
        - id: openapi-media
          uri: http://media-service:8083
          predicates:
            - Path=/media/v3/api-docs/**
        - id: openapi-rating
          uri: http://rating-service:8089
          predicates:
            - Path=/rating/v3/api-docs/**
        - id: openapi-search
          uri: http://search-service:8094
          predicates:
            - Path=/search/v3/api-docs/**
        - id: openapi-promotion
          uri: http://promotion-service:8093
          predicates:
            - Path=/promotion/v3/api-docs/**
        - id: openapi-tax
          uri: http://tax-service:8091
          predicates:
            - Path=/tax/v3/api-docs/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ecommerce}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/ecommerce/protocol/openid-connect/certs}
---
security:
  public-paths:
    auth:
      - /api/v1/auth/signup
      - /api/v1/auth/register
      - /api/v1/auth/signin
      - /api/v1/auth/login
      - /api/v1/auth/refresh
      - /api/v1/auth/refresh-token
      - /api/v1/auth/logout
      - /api/auth/signup
      - /api/auth/register
      - /api/auth/signin
      - /api/auth/refresh
      - /api/auth/logout
    storefront:
      - /api/products/**
      - /api/categories/**
      - /storefront/**
    swagger:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /swagger-resources/**
      - /actuator/**
      - /error
      - /*/v3/api-docs/**
---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
---
logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
