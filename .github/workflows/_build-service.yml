name: Build Service (Reusable)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      port:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "21"
    secrets:
      GHCR_TOKEN:
        required: true

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Push — ${{ inputs.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.service }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="latest"
          else
            TAGS="${{ github.ref_name }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Stagger start to reduce GHCR rate-limit contention
        if: github.event_name != 'pull_request'
        run: sleep $(( RANDOM % 10 ))

      - name: Build & push image with Jib
        if: github.event_name != 'pull_request'
        run: |
          SUCCESS=false
          for i in 1 2 3; do
            mvn -pl ${{ inputs.service }} -am \
              package jib:build \
              -DskipTests -B \
              -Djib.to.image=${{ steps.meta.outputs.image }} \
              -Djib.to.tags=${{ steps.meta.outputs.tags }} \
              -Djib.container.ports=${{ inputs.port }} \
            && { SUCCESS=true; break; }
            jitter=$(( RANDOM % 10 + 1 ))
            delay=$(( i * 8 + jitter ))
            echo "Push attempt $i failed. Retrying in ${delay}s..."
            sleep $delay
          done
          $SUCCESS || { echo "All 3 push attempts failed"; exit 1; }

      - name: Build image tar only (PR — no push)
        if: github.event_name == 'pull_request'
        run: |
          mvn -pl ${{ inputs.service }} -am \
            package jib:buildTar \
            -DskipTests -B \
            -Djib.to.image=${{ steps.meta.outputs.image }}:pr-check \
            -Djib.container.ports=${{ inputs.port }}

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tags }}"
