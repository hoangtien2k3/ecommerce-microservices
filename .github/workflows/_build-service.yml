name: Build Service (Reusable)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      port:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: "21"
    secrets:
      GHCR_TOKEN:
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push — ${{ inputs.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Generate image metadata
        id: meta
        run: |
          SHA="sha-$(git rev-parse --short HEAD)"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.service }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

          TAGS="${SHA}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},latest"
          elif [[ "${{ github.ref_type }}" == "branch" ]]; then
            TAGS="${TAGS},${{ github.ref_name }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push image with Jib
        if: github.event_name != 'pull_request'
        run: |
          mvn -pl ${{ inputs.service }} -am \
            jib:build \
            -DskipTests -B \
            -Djib.to.image=${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }} \
            -Djib.to.tags=${{ steps.meta.outputs.tags }} \
            -Djib.container.ports=${{ inputs.port }}

      - name: Build image tar only (PR — no push)
        if: github.event_name == 'pull_request'
        run: |
          mvn -pl ${{ inputs.service }} -am \
            jib:buildTar \
            -DskipTests -B \
            -Djib.to.image=${{ steps.meta.outputs.image }}:pr-check \
            -Djib.container.ports=${{ inputs.port }}

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}"
