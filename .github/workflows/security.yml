name: Security — Scan

on:
  schedule:
    - cron: "0 2 * * 1"   # every Monday 02:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trivy-fs:
    name: Trivy — filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix file permissions
        run: chmod -R 755 .
      - name: Run Trivy (fs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  trivy-image:
    name: Trivy — image scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - discovery-service
          - api-gateway
          - auth-service
          - product-service
          - order-service
    steps:
      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/ecommerce-microservices/${{ matrix.service }}:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"   # don't fail pipeline, just report
