server:
  port: 8084
  shutdown: graceful
---
spring:
  application:
    name: ORDER-SERVICE
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/orderservice}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:ecommerce@!@#}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/realms/ecommerce}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    oauth:
      use-pkce-with-authorization-code-grant: true
      client-id: swagger-ui
  packagesToScan: com.ecommerce.orderservice
  oauthflow:
    authorization-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:ecommerce}/protocol/openid-connect/auth
    token-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:ecommerce}/protocol/openid-connect/token
---
ecommerce:
  security:
    enabled: ${ECOMMERCE_SECURITY_ENABLED:true}
    csrf-disabled: ${ECOMMERCE_SECURITY_CSRF_DISABLED:true}
    stateless-session: ${ECOMMERCE_SECURITY_STATELESS_SESSION:true}
    public-paths: []
  cors:
    enabled: ${ECOMMERCE_CORS_ENABLED:true}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - X-Correlation-Id
      - X-Request-Id
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}
  rest-client:
    connect-timeout: ${REST_CLIENT_CONNECT_TIMEOUT:5s}
    read-timeout: ${REST_CLIENT_READ_TIMEOUT:30s}
    pool:
      max-total: ${REST_CLIENT_POOL_MAX_TOTAL:200}
      max-per-route: ${REST_CLIENT_POOL_MAX_PER_ROUTE:50}
      keep-alive: ${REST_CLIENT_POOL_KEEP_ALIVE:60s}
      evict-idle-after: ${REST_CLIENT_POOL_EVICT_IDLE_AFTER:30s}
  i18n:
    basenames:
      - classpath:messages/messages
    default-locale: ${I18N_DEFAULT_LOCALE:vi}
    encoding: UTF-8
    cache-duration: ${I18N_CACHE_DURATION:1h}
    fallback-to-system-locale: false
    use-code-as-default-message: false
  web:
    correlation:
      enabled: ${WEB_CORRELATION_ENABLED:true}
    exception-handler:
      enabled: ${WEB_EXCEPTION_HANDLER_ENABLED:true}
    logging:
      request:
        enabled: ${HTTP_LOG_REQUEST_ENABLED:true}
        include-body: ${HTTP_LOG_REQUEST_BODY:true}
        max-body-bytes: ${HTTP_LOG_REQUEST_MAX_BYTES:2048}
      response:
        enabled: ${HTTP_LOG_RESPONSE_ENABLED:true}
        include-body: ${HTTP_LOG_RESPONSE_BODY:false}
        max-body-bytes: ${HTTP_LOG_RESPONSE_MAX_BYTES:2048}
      performance:
        enabled: ${HTTP_LOG_PERF_ENABLED:true}
        threshold-ms: ${HTTP_LOG_PERF_THRESHOLD_MS:50}
  openapi:
    title: Order Service API
    version: ${APP_VERSION:v1}
    description: Cart and order lifecycle (checkout, fulfillment hand-off)
