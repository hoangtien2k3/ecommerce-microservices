# =============================================================================
# Declarative API routes (APISIX Ingress Controller auto-syncs these to APISIX).
#
# PUBLIC STOREFRONT CONTRACT IS CLEAN: the browser calls /api/... and
# /storefront/... and never sees the internal service topology. Each backend
# still runs under a servlet context-path (/auth, /product, ...), so a
# `proxy-rewrite` plugin re-adds that prefix before the request is forwarded
# (e.g. /api/products -> /product/api/products).
#
#   secured  -> plugin_config_name: jwt-auth   (Keycloak JWT verified at the edge)
#   public   -> no plugin_config_name
#
# OpenAPI docs and not-yet-wired backoffice/admin APIs stay service-namespaced
# (they are internal tooling, not part of the public storefront contract).
# =============================================================================
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: auth-service
  namespace: ecommerce
spec:
  http:
    - name: auth
      match:
        paths: [ /api/v1/auth/* ]
      backends:
        - serviceName: auth-service
          servicePort: 8088
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri: [ "^/(.*)", "/auth/$1" ]
    - name: roles
      match:
        paths: [ /api/v1/roles, /api/v1/roles/* ]
      backends:
        - serviceName: auth-service
          servicePort: 8088
      plugin_config_name: jwt-auth
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri: [ "^/(.*)", "/auth/$1" ]
    - name: users
      match:
        paths: [ /api/v1/users, /api/v1/users/* ]
      backends:
        - serviceName: auth-service
          servicePort: 8088
      plugin_config_name: jwt-auth
      plugins:
        - name: proxy-rewrite
          enable: true
          config:
            regex_uri: [ "^/(.*)", "/auth/$1" ]
    - name: docs
      match:
        paths: [ /auth/v3/api-docs/* ]
      backends:
        - serviceName: auth-service
          servicePort: 8088
---
