# Plugins applied to every route in the cluster: CORS, Prometheus metrics
# and a per-IP rate limit.
apiVersion: apisix.apache.org/v2
kind: ApisixGlobalRule
metadata:
  name: global-plugins
  namespace: ecommerce
spec:
  plugins:
    - name: cors
      enable: true
      config:
        # Restrict to the real frontend origin(s) — do NOT ship "*" in prod.
        allow_origins: "https://ecommerce.local,http://ecommerce.local"
        allow_methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
        allow_headers: "Authorization,Content-Type,X-Requested-With"
        max_age: 3600
    - name: prometheus
      enable: true
    - name: limit-count
      enable: true
      config:
        count: 1200
        time_window: 60
        rejected_code: 429
        key_type: var
        key: remote_addr
        # Shared counter across all APISIX replicas (accurate when scaled out).
        policy: redis
        redis_host: redis
        redis_port: 6379
        redis_password: "ecommerce@!@#"   # TODO: source from a Secret (see k8s/SECRETS.md)
        redis_database: 0
        redis_timeout: 1000
