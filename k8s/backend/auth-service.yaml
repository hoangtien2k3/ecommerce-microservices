apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ecommerce
  labels:
    app: auth-service
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-keycloak
          image: busybox
          command: ["sh", "-c", "until nc -z keycloak 8080; do sleep 5; done"]
          securityContext:
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          image: ghcr.io/hoangtien2k3/auth-service:latest
          imagePullPolicy: Always
          terminationMessagePolicy: FallbackToLogsOnError
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            privileged: false
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: ecommerce-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/authservice
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # ── SSO (backend-mediated Authorization Code flow) ──
            # KEYCLOAK_PUBLIC_SERVER_URL comes from the ecommerce-config ConfigMap above.
            - name: SSO_BACKEND_CALLBACK_URL
              value: http://api.ecommerce.local/api/v1/auth/callback
            - name: SSO_DEFAULT_FRONTEND_REDIRECT
              value: http://ecommerce.local/auth/callback
            - name: SSO_ALLOWED_REDIRECT_URIS
              value: http://ecommerce.local/auth/callback,http://admin.ecommerce.local/auth/callback,http://localhost:3000/auth/callback,http://localhost:3001/auth/callback
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: ecommerce
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - port: 8088
      targetPort: 8088
