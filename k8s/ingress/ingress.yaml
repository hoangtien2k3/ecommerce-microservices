apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/limit-rps: "1000"
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    # TLS: cert-manager (uncomment when cert-manager is installed)
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # TLS (uncomment after cert-manager setup)
  # tls:
  #   - hosts:
  #       - api.ecommerce.local
  #       - ecommerce.local
  #       - keycloak.ecommerce.local
  #     secretName: ecommerce-tls
  rules:
    # Frontend (storefront)
    - host: ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
    # Admin dashboard
    - host: admin.ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  number: 3001
    # Keycloak
    - host: keycloak.ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
    # rustfs (S3-compatible object storage)
    - host: rustfs.ecommerce.local
      http:
        paths:
          # Web console UI → http://rustfs.ecommerce.local/rustfs/console/
          - path: /rustfs/console
            pathType: Prefix
            backend:
              service:
                name: rustfs
                port:
                  number: 9001
          # S3 API (everything else; used by services for media storage)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustfs
                port:
                  number: 9000
