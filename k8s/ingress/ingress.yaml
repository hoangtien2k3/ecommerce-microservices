apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  namespace: ecommerce
  annotations:
    # ── Proxy timeouts ────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # ── WebSocket / SSE support for reactive gateway ──────────────────
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # ── Edge-level rate limit (coarse, fine-grained done in SCG) ──────
    nginx.ingress.kubernetes.io/limit-rps: "1000"
    # ── Gzip compression ─────────────────────────────────────────────
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    # ── TLS: cert-manager (uncomment when cert-manager is installed) ──
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # ── TLS (uncomment after cert-manager setup) ─────────────────────
  # tls:
  #   - hosts:
  #       - api.ecommerce.local
  #       - ecommerce.local
  #       - auth.ecommerce.local
  #     secretName: ecommerce-tls
  rules:
    # ── Frontend ─────────────────────────────────────────────────────
    - host: ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000

    # ── API Gateway (Spring Cloud Gateway — all traffic goes here) ────
    - host: api.ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8888

    # ── Keycloak ──────────────────────────────────────────────────────
    - host: auth.ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

    # ── Zipkin tracing UI ─────────────────────────────────────────────
    - host: zipkin.ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zipkin
                port:
                  number: 9411

    # ── MinIO Console ─────────────────────────────────────────────────
    - host: minio.ecommerce.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9001
