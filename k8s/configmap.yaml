apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  # PostgresSQL
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "ecommerce"

  # Keycloak
  KEYCLOAK_ISSUER_URI: "http://keycloak:8080/realms/ecommerce"
  KEYCLOAK_JWK_SET_URI: "http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs"
  JWT_ISSUER_URI: "http://keycloak:8080/realms/ecommerce"
  KEYCLOAK_SERVER_URL: "http://keycloak:8080"

  # Kafka
  KAFKA_SERVERS: "kafka:9092"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # Elasticsearch
  ELASTICSEARCH_URL: "http://elasticsearch:9200"

  # Object storage (RustFS - S3-compatible)
  STORAGE_ENDPOINT: "http://rustfs:9000"
  STORAGE_REGION: "us-east-1"
  STORAGE_BUCKET: "ecommerce-media"

  # Zipkin
  ZIPKIN_URL: "http://zipkin:9411"

  # Hibernate
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"

  # JVM heap limit
  JAVA_TOOL_OPTIONS: "-Xmx200m -Xms100m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
