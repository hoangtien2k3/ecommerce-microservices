# Copy file này thành secrets.yaml rồi điền giá trị thật vào
# cp k8s/secrets.example.yaml k8s/secrets.yaml

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ecommerce
type: Opaque
stringData:
  POSTGRES_USER: "your_postgres_user"
  POSTGRES_PASSWORD: "your_postgres_password"

---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: ecommerce
type: Opaque
stringData:
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "your_keycloak_password"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: ecommerce
type: Opaque
stringData:
  REDIS_PASSWORD: "your_redis_password"

---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: ecommerce
type: Opaque
stringData:
  MINIO_ROOT_USER: "admin"
  MINIO_ROOT_PASSWORD: "your_minio_password"

---
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-secret
  namespace: ecommerce
type: Opaque
stringData:
  ELASTIC_PASSWORD: "your_elastic_password"

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: ecommerce
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "admin"
  MONGO_INITDB_ROOT_PASSWORD: "your_mongo_password"

---
apiVersion: v1
kind: Secret
metadata:
  name: mail-secret
  namespace: ecommerce
type: Opaque
stringData:
  MAIL_USERNAME: "your_email@gmail.com"
  MAIL_PASSWORD: "your_gmail_app_password"
