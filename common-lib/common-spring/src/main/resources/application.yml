# Default values applied to every service that pulls common-lib in.
# Override per service via its own application.yml or environment variables.
spring:
  application:
    name: ${SERVICE_NAME:common-lib-default}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://identity/realms/ecommerce}
---
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
---
springdoc:
  oauthflow:
    authorization-url: ${JWT_AUTH_URL:http://identity/realms/ecommerce/protocol/openid-connect/auth}
    token-url: ${JWT_TOKEN_URL:http://identity/realms/ecommerce/protocol/openid-connect/token}
---
ecommerce:
  cors:
    enabled: true
    allowed-origin-patterns:
      - "*"
  security:
    enabled: true
    csrf-disabled: true
    stateless-session: true
  i18n:
    default-locale: vi
  rest-client:
    connect-timeout: ${REST_CLIENT_CONNECT_TIMEOUT:5s}
    read-timeout: ${REST_CLIENT_READ_TIMEOUT:30s}
    pool:
      max-total: ${REST_CLIENT_POOL_MAX_TOTAL:200}
      max-per-route: ${REST_CLIENT_POOL_MAX_PER_ROUTE:50}
      keep-alive: ${REST_CLIENT_POOL_KEEP_ALIVE:60s}
      evict-idle-after: ${REST_CLIENT_POOL_EVICT_IDLE_AFTER:30s}
