upstreams:
- id: 1
  type: roundrobin
  nodes:
    auth-service:8088: 1
- id: 2
  type: roundrobin
  nodes:
    product-service:8086: 1
- id: 3
  type: roundrobin
  nodes:
    order-service:8084: 1
- id: 4
  type: roundrobin
  nodes:
    payment-service:8085: 1
- id: 5
  type: roundrobin
  nodes:
    inventory-service:8082: 1
- id: 6
  type: roundrobin
  nodes:
    shipping-service:8087: 1
- id: 7
  type: roundrobin
  nodes:
    favourite-service:8081: 1
- id: 8
  type: roundrobin
  nodes:
    notification-service:8090: 1
- id: 9
  type: roundrobin
  nodes:
    media-service:8083: 1
- id: 10
  type: roundrobin
  nodes:
    rating-service:8089: 1
- id: 11
  type: roundrobin
  nodes:
    search-service:8094: 1
- id: 12
  type: roundrobin
  nodes:
    promotion-service:8093: 1
- id: 13
  type: roundrobin
  nodes:
    tax-service:8091: 1
global_rules:
- id: 1
  plugins:
    prometheus: {}
    cors:
      allow_origins: http://localhost:3000,http://ecommerce.local,http://ecommerce.local:9090
      allow_methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allow_headers: Authorization,Content-Type,X-Requested-With
      max_age: 3600
    limit-count:
      count: 1200
      time_window: 60
      rejected_code: 429
      key_type: var
      key: remote_addr
      policy: local
routes:
- id: auth-public
  upstream_id: 1
  uri: /api/v1/auth/*
  plugins:
    proxy-rewrite:
      regex_uri:
      - ^/(.*)
      - /auth/$1
- id: product-catalog
  upstream_id: 2
  uris:
  - /api/categories
  - /api/categories/*
  - /api/products
  - /api/products/*
  plugins:
    proxy-rewrite:
      regex_uri:
      - ^/(.*)
      - /product/$1
- id: rating-storefront
  upstream_id: 10
  uris:
  - /storefront/ratings
  - /storefront/ratings/*
  plugins:
    proxy-rewrite:
      regex_uri:
      - ^/(.*)
      - /rating/$1
- id: search-storefront
  upstream_id: 11
  uris:
  - /storefront/catalog-search
  - /storefront/search_suggest
  plugins:
    proxy-rewrite:
      regex_uri:
      - ^/(.*)
      - /search/$1
- id: openapi-auth
  upstream_id: 1
  uri: /auth/v3/api-docs/*
- id: openapi-product
  upstream_id: 2
  uri: /product/v3/api-docs/*
- id: openapi-order
  upstream_id: 3
  uri: /order/v3/api-docs/*
- id: openapi-payment
  upstream_id: 4
  uri: /payment/v3/api-docs/*
- id: openapi-inventory
  upstream_id: 5
  uri: /inventory/v3/api-docs/*
- id: openapi-shipping
  upstream_id: 6
  uri: /shipping/v3/api-docs/*
- id: openapi-favourite
  upstream_id: 7
  uri: /favourite/v3/api-docs/*
- id: openapi-notification
  upstream_id: 8
  uri: /notification/v3/api-docs/*
- id: openapi-media
  upstream_id: 9
